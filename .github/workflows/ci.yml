name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - "codex/**"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check data script syntax
        run: python -m py_compile scripts/fetch-akshare-etf.py
