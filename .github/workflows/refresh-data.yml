name: Refresh ETF data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * 1-5"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install data dependencies
        run: python -m pip install --upgrade akshare pandas

      - name: Fetch ETF bars
        run: python scripts/fetch-akshare-etf.py

      - name: Commit generated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: refresh a-share etf bars"
          file_pattern: public/data/a-share-etf-bars.generated.json
